<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="inicio.css">
</head>
<body>


    <!-- CONTENEDOR PRINCIPAL DE INICIO -->
<section class="inicio-view">
    
    <!-- HEADER CON GRADIENTE -->
    <div class="inicio-hero">
        <div class="hero-icon-container">
            <div class="hero-emoji">🚧</div>
        </div>
        <h2>Sección en desarrollo</h2>
        <p>Próximamente vas a poder ver y gestionar toda tu información desde acá</p>
    </div>

    <!-- LISTADO DE CARACTERÍSTICAS -->
    <div class="inicio-info-list">
        <p class="list-label">QUÉ VAS A ENCONTRAR ACÁ</p>

        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-green">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            </div>
            <span class="item-text">Total prestado</span>
        </div>

        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
            </div>
            <span class="item-text">Dinero a recuperar</span>
        </div>

        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-purple">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <span class="item-text">Acciones rápidas (cobrar, nuevo préstamo)</span>
        </div>

        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-cyan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            </div>
            <span class="item-text">Resumen diario</span>
        </div>


        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-red">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <span class="item-text">Cuotas vencidas</span>
        </div>

        <div class="inicio-item-card">
            <div class="item-icon-wrap icon-yellow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <span class="item-text">Próximas cuotas a vencer</span>
        </div>

    <!-- BOTÓN FINAL -->


    <a href="clientesyprestamos.html" class="btn-inicio-entendido"> Volver</a>
